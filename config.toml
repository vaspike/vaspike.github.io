baseURL = 'https://vaspike.com'
theme = "risotto"
title = "@River Mao"
author = "River Mao"
copyright = "© 2022 River Mao"
paginate = 3
languageCode = "zh"
DefaultContentLanguage = "zh"
enableInlineShortcodes = true
# prevent build failures when using Hugo's Instagram shortcode due to deprecated Instagram API.
# See https://github.com/gohugoio/hugo/issues/7228#issuecomment-714490456
ignoreErrors = ["error-remote-getjson"]

# Automatically add content sections to main menu
sectionPagesMenu = "main"

publishDir = "docs"

[params]

[params.theme]
palette = "gruvbox-dark"
mode = "dark-mode"

# Sidebar: about/bio
[params.about]
title = "毛小川's Blog"
description = "环游是无趣~"
logo = "images/terminal.png"


[[params.socialLinks]]
icon = "fab fa-github"
title = "GitHub"
url = "https://github.com/vaspike"

[menu]

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 10